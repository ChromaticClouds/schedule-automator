name: Mobile visual screenshots

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Capture artifacts, compare baselines, or generate baselines.
        required: true
        default: capture
        type: choice
        options:
          - capture
          - test
          - update

permissions:
  contents: read

jobs:
  visual:
    name: Planning stories (${{ inputs.mode }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-scheduler-mobile
    env:
      CI: "true"
      VISUAL_RUN_MODE: ${{ inputs.mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: ai-scheduler-mobile/pnpm-lock.yaml

      - name: Install mobile dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run planning visual workflow
        run: pnpm visual:ci

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: planning-storybook-${{ inputs.mode }}
          path: |
            ai-scheduler-mobile/test-results/visual
            ai-scheduler-mobile/playwright-report
            ai-scheduler-mobile/tests/visual/__screenshots__
          if-no-files-found: warn
          retention-days: 7
